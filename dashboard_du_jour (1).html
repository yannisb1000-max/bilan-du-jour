<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Bilan du jour</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #14120F;
    --surface: #1E1B17;
    --surface-2: #262119;
    --hairline: #332E26;
    --text: #F2EDE4;
    --text-muted: #8C8579;
    --amber: #E8A33D;
    --sage: #7FA37A;
    --rust: #C4634A;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--bg);
    color: var(--text);
    font-family:'Space Grotesk', system-ui, sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    padding: 20px 16px 60px;
  }
  .mono{ font-family:'IBM Plex Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }

  .wrap{ max-width: 480px; margin: 0 auto; }

  header{
    display:flex; align-items:baseline; justify-content:space-between;
    margin-bottom: 22px;
  }
  header .date{
    font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-muted); font-weight:500;
  }
  header .date span{ color: var(--amber); }
  #refreshBtn{
    background:none; border:1px solid var(--hairline); color: var(--text-muted);
    width:30px; height:30px; border-radius:8px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition: border-color .15s, color .15s, transform .3s;
  }
  #refreshBtn:hover{ border-color: var(--amber); color: var(--amber); }
  #refreshBtn.spin svg{ animation: spin .6s linear; }
  @keyframes spin{ to{ transform: rotate(360deg); } }
  #refreshBtn:focus-visible{ outline: 2px solid var(--amber); outline-offset: 2px; }

  .card{
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: 14px;
    padding: 18px 18px 20px;
    margin-bottom: 12px;
  }
  .eyebrow{
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-muted); font-weight: 600; margin: 0 0 10px;
  }

  /* Poids */
  .poids-row{ display:flex; align-items:baseline; gap:8px; }
  .poids-row .val{ font-size: 34px; font-weight:600; }
  .poids-row .unit{ font-size:15px; color:var(--text-muted); }
  .poids-note{ font-size:12px; color:var(--text-muted); margin-top:4px; }

  /* Bilan calorique — hero */
  .hero{ padding-top:20px; }
  .hero .balance{
    font-size: 46px; font-weight:700; line-height:1;
    display:flex; align-items:flex-end; gap:6px;
  }
  .hero .balance .sign{ font-size: 28px; opacity:0.7; }
  .hero .balance-label{ font-size:13px; color:var(--text-muted); margin-top:6px; }

  .gauge{
    position:relative; height:10px; border-radius:6px;
    background: var(--surface-2); margin: 18px 0 10px; overflow:hidden;
  }
  .gauge-fill{
    position:absolute; left:0; top:0; height:100%; border-radius:6px;
    width:0%; transition: width 1s cubic-bezier(.16,1,.3,1);
  }
  .gauge-marker{
    position:absolute; top:-4px; width:2px; height:18px; background: var(--text);
    opacity:0.5;
  }
  .kv-row{ display:flex; justify-content:space-between; font-size:13px; color:var(--text-muted); }
  .kv-row .kv-val{ color: var(--text); font-weight:500; }

  /* Séance */
  .seance-name{ font-size:19px; font-weight:600; margin-bottom:10px; }
  .stat-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .stat{
    background: var(--surface-2); border-radius:10px; padding:10px 4px;
    text-align:center;
  }
  .stat .stat-val{ font-size:18px; font-weight:600; }
  .stat .stat-label{ font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-muted); margin-top:2px; }
  .empty{ color:var(--text-muted); font-size:14px; padding: 6px 0 2px; }

  /* Repas */
  .meal{ padding: 12px 0; border-top:1px solid var(--hairline); }
  .meal:first-child{ border-top:none; padding-top:2px; }
  .meal-type{ font-size:14px; font-weight:600; margin-bottom:3px; }
  .meal-desc{ font-size:13px; color:var(--text-muted); line-height:1.4; margin-bottom:8px; }
  .macros{ display:flex; gap:8px; flex-wrap:wrap; }
  .macro-pill{
    font-size:11px; padding:3px 8px; border-radius:20px;
    background: var(--surface-2); color: var(--text-muted);
  }
  .macro-pill b{ color:var(--text); font-weight:600; }
  .meal-total{
    display:flex; justify-content:space-between; align-items:center;
    padding-top:14px; margin-top:4px; border-top:1px solid var(--hairline);
    font-size:13px;
  }
  .meal-total .kv-val{ font-size:16px; font-weight:600; color: var(--amber); }

  /* States */
  #loadingState, #errorState{
    text-align:center; padding: 60px 20px; color: var(--text-muted);
  }
  #errorState{ display:none; }
  #errorState .err-title{ color: var(--rust); font-weight:600; margin-bottom:6px; }
  #app{ display:none; }
  .fade-in{ animation: fadeIn .5s ease both; }
  @keyframes fadeIn{ from{ opacity:0; transform: translateY(6px);} to{ opacity:1; transform:none; } }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
  .quick-actions{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
  .quick-btn{
    display:flex; align-items:center; gap:10px;
    background: var(--surface-2); border: 1px solid var(--hairline);
    border-radius: 10px; padding: 12px 12px;
    text-decoration:none; color: var(--text);
    font-size: 13px; font-weight:500;
    transition: border-color .15s, transform .1s;
  }
  .quick-btn:active{ transform: scale(0.97); }
  .quick-btn:hover{ border-color: var(--amber); }
  .quick-btn .dot{
    width:7px; height:7px; border-radius:50%; flex-shrink:0;
    background: var(--amber);
  }
  .quick-btn.sage .dot{ background: var(--sage); }

  /* PIN gate */
  #pinGate{
    min-height: 70vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
    padding: 20px;
  }
  #pinGate .lock-label{
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-muted); font-weight:600; margin-bottom: 18px;
  }
  #pinInput{
    background: var(--surface); border: 1px solid var(--hairline);
    color: var(--text); font-family:'IBM Plex Mono', monospace;
    font-size: 28px; letter-spacing: 0.5em; text-align:center;
    width: 200px; padding: 14px 10px 14px 20px; border-radius: 12px;
    margin-bottom: 16px;
  }
  #pinInput:focus{ outline: 2px solid var(--amber); border-color: var(--amber); }
  #pinSubmit{
    background: var(--amber); color: #14120F; border:none;
    font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:14px;
    padding: 11px 26px; border-radius: 10px; cursor:pointer;
  }
  #pinSubmit:active{ transform: scale(0.97); }
  #pinError{
    color: var(--rust); font-size: 13px; margin-top: 12px; min-height: 18px;
  }
</style>
</head>
<body>
<div class="wrap">

  <div id="pinGate">
    <div class="lock-label">Accès protégé</div>
    <input id="pinInput" type="tel" inputmode="numeric" maxlength="4" placeholder="••••" autocomplete="off">
    <br>
    <button id="pinSubmit" onclick="checkPin()">Déverrouiller</button>
    <div id="pinError"></div>
  </div>

  <div id="loadingState" style="display:none;">Chargement des données…</div>

  <div id="errorState">
    <div class="err-title">Impossible de charger les données</div>
    <div id="errorDetail" style="font-size:13px;"></div>
  </div>

  <div id="app">
    <header>
      <div class="date">Aujourd'hui · <span id="dateLabel"></span></div>
      <button id="refreshBtn" aria-label="Actualiser" onclick="load(true)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
      </button>
    </header>

    <div class="card fade-in">
      <p class="eyebrow">Poids du jour</p>
      <div class="poids-row">
        <span class="val mono" id="poidsVal">—</span>
        <span class="unit">kg</span>
      </div>
      <div class="poids-note" id="poidsNote"></div>
    </div>

    <div class="card hero fade-in">
      <p class="eyebrow">Bilan calorique</p>
      <div class="balance">
        <span class="sign" id="balanceSign"></span>
        <span class="mono" id="balanceVal">—</span>
        <span style="font-size:20px; font-weight:500; color:var(--text-muted);">kcal</span>
      </div>
      <div class="balance-label" id="balanceLabel">déficit par rapport à ta dépense</div>

      <div class="gauge">
        <div class="gauge-fill" id="gaugeFill"></div>
        <div class="gauge-marker" id="gaugeMarker"></div>
      </div>
      <div class="kv-row">
        <span>Dépensé (Whoop) <span class="kv-val mono" id="depenseVal">—</span></span>
        <span>Mangé <span class="kv-val mono" id="mangeVal">—</span></span>
      </div>
    </div>

    <div class="card fade-in">
      <p class="eyebrow">Actions rapides</p>
      <div class="quick-actions">
        <a class="quick-btn" href="shortcuts://run-shortcut?name=Log%20repas"><span class="dot"></span>Log repas</a>
        <a class="quick-btn" href="shortcuts://run-shortcut?name=Log%20s%C3%A9ance"><span class="dot"></span>Log séance</a>
        <a class="quick-btn sage" href="shortcuts://run-shortcut?name=Bilan%20IA"><span class="dot"></span>Bilan IA</a>
        <a class="quick-btn sage" href="shortcuts://run-shortcut?name=Balance"><span class="dot"></span>Balance</a>
      </div>
    </div>

    <div class="card fade-in">
      <p class="eyebrow">Séance</p>
      <div id="seanceContent"></div>
    </div>

    <div class="card fade-in">
      <p class="eyebrow">Repas de la journée</p>
      <div id="repasContent"></div>
      <div class="meal-total" id="repasTotalRow" style="display:none;">
        <span>Total</span>
        <span class="kv-val mono" id="repasTotalVal"></span>
      </div>
    </div>
  </div>

</div>

<script>
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwPEJzv0wW9U7lnZs_q_8ZFhV8rXD1Af6PAEkADih_ycOUS5ombD0BR6Y31v5FLYBGQeQ/exec";
const SECRET = "ro_view_9f3ab2";
const PIN = "1122"; 

function checkPin(){
  const input = document.getElementById('pinInput');
  const err = document.getElementById('pinError');
  if(input.value === PIN){
    document.getElementById('pinGate').style.display = 'none';
    document.getElementById('loadingState').style.display = 'block';
    load(false);
  } else {
    err.textContent = 'Code incorrect';
    input.value = '';
    input.focus();
  }
}
document.getElementById('pinInput').addEventListener('keydown', e => {
  if(e.key === 'Enter') checkPin();
});
document.getElementById('pinInput').focus();

function todayStr(){
  // Europe/Paris — aligné sur le fuseau utilisé côté script
  const fmt = new Intl.DateTimeFormat('fr-CA', { timeZone: 'Europe/Paris', year:'numeric', month:'2-digit', day:'2-digit' });
  return fmt.format(new Date()); // yyyy-mm-dd
}

function fmtDateLabel(d){
  const dt = new Date(d + 'T00:00:00');
  return new Intl.DateTimeFormat('fr-FR', { weekday:'long', day:'numeric', month:'long' }).format(dt);
}

function num(v){
  const n = Number(v);
  return isNaN(n) ? null : n;
}

async function load(isManual){
  const btn = document.getElementById('refreshBtn');
  if(isManual){ btn.classList.add('spin'); setTimeout(()=>btn.classList.remove('spin'), 600); }
  document.getElementById('loadingState').style.display = 'block';
  document.getElementById('errorState').style.display = 'none';
  document.getElementById('app').style.display = 'none';

  try{
    const res = await fetch(`${WEBAPP_URL}?secret=${encodeURIComponent(SECRET)}&days=14`);
    if(!res.ok) throw new Error(`Réponse HTTP ${res.status}`);
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    render(data);
  }catch(err){
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('errorState').style.display = 'block';
    document.getElementById('errorDetail').textContent = err.message + " — vérifie ta connexion, ou que le script est bien déployé.";
  }
}

function render(data){
  const today = todayStr();
  document.getElementById('dateLabel').textContent = fmtDateLabel(today);

  const whoop = data.whoop || [];
  const health = data.health || [];
  const seances = data.seances || [];
  const repasLog = data.repas_log || [];

  // --- Poids du jour (avec repli sur la dernière valeur connue) ---
  let poidsEntry = health.slice().reverse().find(r => r['Poids'] !== '' && r['Poids'] !== undefined);
  const poidsVal = document.getElementById('poidsVal');
  const poidsNote = document.getElementById('poidsNote');
  if(poidsEntry){
    poidsVal.textContent = num(poidsEntry['Poids']).toFixed(1);
    if(poidsEntry['Date'] !== today){
      poidsNote.textContent = `Dernière mesure : ${fmtDateLabel(poidsEntry['Date'])}`;
    } else {
      poidsNote.textContent = '';
    }
  } else {
    poidsVal.textContent = '—';
    poidsNote.textContent = 'Aucune donnée disponible';
  }

  // --- Repas du jour ---
  const mealsToday = repasLog.filter(r => r['Date'] === today);
  const repasContent = document.getElementById('repasContent');
  let totalCal = 0, totalProt = 0;
  if(mealsToday.length === 0){
    repasContent.innerHTML = '<div class="empty">Aucun repas loggé aujourd\'hui</div>';
    document.getElementById('repasTotalRow').style.display = 'none';
  } else {
    repasContent.innerHTML = mealsToday.map(m => {
      const cal = num(m['Calories']) || 0;
      const prot = num(m['Protéines']) || 0;
      totalCal += cal; totalProt += prot;
      return `
        <div class="meal">
          <div class="meal-type">${m['Type Repas'] || ''}</div>
          <div class="meal-desc">${m['Description'] || ''}</div>
          <div class="macros">
            <span class="macro-pill"><b>${cal ? Math.round(cal) : '—'}</b> kcal</span>
            <span class="macro-pill"><b>${num(m['Protéines']) ?? '—'}</b>g P</span>
            <span class="macro-pill"><b>${num(m['Lipides']) ?? '—'}</b>g L</span>
            <span class="macro-pill"><b>${num(m['Glucides']) ?? '—'}</b>g G</span>
          </div>
        </div>`;
    }).join('');
    document.getElementById('repasTotalRow').style.display = 'flex';
    document.getElementById('repasTotalVal').textContent = `${Math.round(totalCal)} kcal · ${totalProt.toFixed(0)}g protéines`;
  }

  // --- Séance du jour ---
  const seanceToday = seances.find(s => s['Date'] === today);
  const seanceContent = document.getElementById('seanceContent');
  if(!seanceToday){
    seanceContent.innerHTML = '<div class="empty">Pas de séance loggée aujourd\'hui</div>';
  } else {
    seanceContent.innerHTML = `
      <div class="seance-name">${seanceToday['Type'] || 'Séance'}</div>
      <div class="stat-grid">
        <div class="stat">
          <div class="stat-val mono">${seanceToday['Strain Séance'] || '—'}</div>
          <div class="stat-label">Strain</div>
        </div>
        <div class="stat">
          <div class="stat-val mono">${seanceToday['Calories'] ? Math.round(seanceToday['Calories']) : '—'}</div>
          <div class="stat-label">Kcal</div>
        </div>
        <div class="stat">
          <div class="stat-val mono">${seanceToday['Durée (min)'] ? Math.round(seanceToday['Durée (min)']) : '—'}</div>
          <div class="stat-label">Minutes</div>
        </div>
      </div>`;
  }

  // --- Bilan calorique ---
  const whoopToday = whoop.find(w => w['Date'] === today);
  const depense = whoopToday ? num(whoopToday['Calories Jour']) : null;
  const mange = mealsToday.length ? totalCal : null;

  document.getElementById('depenseVal').textContent = depense !== null ? Math.round(depense) : '—';
  document.getElementById('mangeVal').textContent = mange !== null ? Math.round(mange) : '—';

  const balanceVal = document.getElementById('balanceVal');
  const balanceSign = document.getElementById('balanceSign');
  const balanceLabel = document.getElementById('balanceLabel');
  const gaugeFill = document.getElementById('gaugeFill');
  const gaugeMarker = document.getElementById('gaugeMarker');

  if(depense !== null && mange !== null){
    const balance = depense - mange; // positif = déficit, négatif = surplus
    balanceVal.textContent = Math.abs(Math.round(balance));
    balanceSign.textContent = balance >= 0 ? '−' : '+';
    balanceVal.style.color = balance >= 0 ? 'var(--sage)' : 'var(--rust)';
    balanceSign.style.color = balance >= 0 ? 'var(--sage)' : 'var(--rust)';
    balanceLabel.textContent = balance >= 0 ? 'déficit calorique aujourd\'hui' : 'surplus calorique aujourd\'hui';

    const pct = Math.max(0, Math.min(100, (mange / depense) * 100));
    gaugeFill.style.width = pct + '%';
    gaugeFill.style.background = balance >= 0 ? 'var(--sage)' : 'var(--rust)';
    gaugeMarker.style.left = '100%';
  } else {
    balanceVal.textContent = '—';
    balanceSign.textContent = '';
    balanceLabel.textContent = depense === null ? 'Donnée Whoop du jour indisponible' : 'Aucun repas loggé pour calculer le bilan';
    gaugeFill.style.width = '0%';
  }

  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}
</script>
</body>
</html>
